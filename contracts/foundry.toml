[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
mezo_mainnet = "https://mainnet.mezo.public.validationcloud.io/"
mezo_testnet = "https://rpc.test.mezo.org"

[etherscan]
mezo_mainnet = { key = "any", url = "https://explorer.mezo.org/api", chain = 31612 }
mezo_testnet = { key = "any", url = "https://explorer.test.mezo.org/api", chain = 31611 }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
